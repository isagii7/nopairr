<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXTY-MD SESSION</title>   <!-- changed -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      /* (all styles remain unchanged) */
      :root {
        --primary-color: #1a1a2e;
        --secondary-color: #16213e;
        --accent-color: #0f3460;
        --text-color: #f1f1f1;
        --background-color: #121212;
        --hover-color: #2d2d44;
        --border-color: rgba(255, 255, 255, 0.08);
        --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --gradient-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        --success-color: #4ade80;
        --card-bg: rgba(255, 255, 255, 0.02);
      }
      /* rest unchanged */
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo"><i class="fas fa-robot"></i></div>
        <h1 class="title">NEXTY-MD</h1>   <!-- changed -->
        <p class="subtitle">Link your WhatsApp device</p>
        <div class="social-icons">
          <a
            href=""
            target="https://youtube.com/@arslanmdofficial"
            class="youtube"
            ><i class="fab fa-youtube"></i
          ></a>
          <a
            href=""
            target="@arslan-md"
            class="telegram"
            ><i class="fab fa-facebook"></i
          ></a>
          <a href="" target="_blank" class="whatsapp"
            ><i class="fab fa-whatsapp"></i
          ></a>
          <a
            href=""
            target="https://github.com/Arslan-MD"
            class="github"
            ><i class="fab fa-github"></i
          ></a>
        </div>
      </div>

      <!-- Toggle Switch -->
      <div class="toggle-container">
        <div class="toggle-option active" data-mode="pair">
          <i class="fas fa-key"></i> Pair Code
        </div>
        <div class="toggle-option" data-mode="qr">
          <i class="fas fa-qrcode"></i> QR Code
        </div>
      </div>

      <div class="input-group" id="inputGroup">
        <label class="input-label"
          >Enter your WhatsApp number with country code</label
        >
        <input
          type="text"
          id="mobileNumber"
          class="input-field"
          placeholder="+923237045919"
          pattern="[+][0-9]{10,}"
          title="Please enter country code starting with + followed by number"
        />
      </div>

      <button class="generate-btn" id="submit">
        <i class="fas fa-key"></i> Generate Pair Code
      </button>

      <div class="loading" id="loading">
        <i class="fas fa-spinner"></i>
      </div>

      <div class="code-display" id="codeDisplay">
        Your pair code will appear here
      </div>

      <div class="qr-display" id="qrDisplay">
        <img id="qrImage" class="qr-image" src="" alt="QR Code" />
        <div class="qr-instructions" id="qrInstructions">
          Scan this QR code with your WhatsApp app
        </div>
      </div>

      <button class="copy-btn" id="copy" onclick="copyCode()">
        <i class="fas fa-copy"></i> Copy Code
      </button>

      <div class="footer">
        <p>© 2026 NEXTY FORWARD. All rights reserved.</p>   <!-- changed -->
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
    <script>
      let currentMode = "pair";

      document.querySelectorAll(".toggle-option").forEach((option) => {
        option.addEventListener("click", function () {
          const mode = this.dataset.mode;
          if (mode === currentMode) return;
          document
            .querySelectorAll(".toggle-option")
            .forEach((opt) => opt.classList.remove("active"));
          this.classList.add("active");
          currentMode = mode;
          const submitBtn = document.getElementById("submit");
          const inputGroup = document.getElementById("inputGroup");
          if (mode === "pair") {
            submitBtn.innerHTML =
              '<i class="fas fa-key"></i> Generate Pair Code';
            submitBtn.classList.remove("hidden");
            inputGroup.classList.remove("hidden");
          } else {
            submitBtn.classList.add("hidden");
            inputGroup.classList.add("hidden");
            generateQRCode();
          }
          document.getElementById("codeDisplay").innerHTML =
            "Your pair code will appear here";
          document.getElementById("qrDisplay").style.display = "none";
          document.getElementById("codeDisplay").style.display = "flex";
        });
      });

      async function generateQRCode() {
        const codeDisplay = document.getElementById("codeDisplay");
        const qrDisplay = document.getElementById("qrDisplay");
        const loadingSpinner = document.getElementById("loading");

        loadingSpinner.style.display = "block";
        codeDisplay.innerHTML = "";
        qrDisplay.style.display = "none";

        try {
          const response = await axios("/qr");

          if (response.data.qr) {
            document.getElementById("qrImage").src = response.data.qr;
            document.getElementById("qrInstructions").innerHTML =
              response.data.instructions.join("<br>");
            qrDisplay.style.display = "block";
            codeDisplay.style.display = "none";
          } else {
            codeDisplay.innerHTML =
              '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Failed to generate QR code</div>';
            codeDisplay.style.display = "flex";
          }
        } catch (error) {
          console.error("Error generating QR code:", error);
          codeDisplay.innerHTML =
            '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating QR code. Please try again.</div>';
          codeDisplay.style.display = "flex";
        } finally {
          loadingSpinner.style.display = "none";
        }
      }

      document.getElementById("submit").addEventListener("click", async (e) => {
        e.preventDefault();
        const mobileNumberInput = document.getElementById("mobileNumber");
        const codeDisplay = document.getElementById("codeDisplay");
        const qrDisplay = document.getElementById("qrDisplay");
        const loadingSpinner = document.getElementById("loading");

        const mobileNumber = mobileNumberInput.value.trim();
        if (!mobileNumber) {
          codeDisplay.innerHTML =
            '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Please enter your WhatsApp number</div>';
          return;
        }

        loadingSpinner.style.display = "block";
        codeDisplay.innerHTML = "";
        qrDisplay.style.display = "none";

        try {
          const response = await axios(
            `/pair?number=${mobileNumber.replace(/[^0-9]/g, "")}`,
          );

          const code = response.data.code || "Service Unavailable";
          if (code === "Service Unavailable") {
            codeDisplay.innerHTML =
              '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Service Unavailable</div>';
          } else {
            codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> CODE: ${code}</div>`;
          }
          codeDisplay.style.display = "flex";
        } catch (error) {
          console.error("Error generating code:", error);
          codeDisplay.innerHTML =
            '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating code. Please try again.</div>';
          codeDisplay.style.display = "flex";
        } finally {
          loadingSpinner.style.display = "none";
        }
      });
      function copyCode() {
        const codeDisplay = document.getElementById("codeDisplay").innerText;
        const code = codeDisplay.replace("CODE: ", "");
        navigator.clipboard
          .writeText(code)
          .then(() => {
            const copyBtn = document.getElementById("copy");
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => {
              copyBtn.innerHTML = originalText;
            }, 2000);
          })
          .catch((err) => {
            console.error("Failed to copy text: ", err);
          });
      }
    </script>
  </body>
</html>
