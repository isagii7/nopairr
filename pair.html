<!DOCTYPE html>
<html>
<head>
    <title>NEXTY-MD PAIR</title>
</head>
<body>
    <h1>NEXTY-MD Pair Code</h1>
    <input type="text" id="number" placeholder="923123456789" />
    <button onclick="getPair()">Get Pair Code</button>
    <p id="result"></p>

    <script>
        async function getPair() {
            const num = document.getElementById("number").value.trim();
            if (!num) {
                document.getElementById("result").innerHTML = "❌ Please enter number";
                return;
            }
            document.getElementById("result").innerHTML = "⏳ Loading...";
            try {
                const res = await fetch(`/pair?number=${num.replace(/[^0-9]/g, "")}`);
                const data = await res.json();
                document.getElementById("result").innerHTML = `✅ CODE: ${data.code || "Error"}`;
            } catch (e) {
                document.getElementById("result").innerHTML = "❌ Server error";
            }
        }
    </script>
</body>
</html>
